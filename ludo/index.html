<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ludo</title>
    <script src="https://unpkg.com/vue@3.5.34/dist/vue.global.js"></script>
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="app">
      <div id="board">
        <div class="board-top">
          <div class="base">

              <div class="position"></div>
              <div class="position"></div>
            </div>
            <div class="lower-position">
              <div class="position"></div>
              <div class="position"></div>
            </div>
          </div>
          <div class="gallery vertical">
            <div class="path">
              <div class="cell" v-for="n in 6" :key="n"></div>
            </div>
            <div class="path">
              <div class="cell" v-for="n in 6" :key="n"></div>
            </div>
            <div class="path">
              <div class="cell" v-for="n in 6" :key="n"></div>
            </div>
          </div>
          <div class="base"></div>
        </div>

        <div class="board-middle">
          <div class="gallery">
            <div class="path">
              <div class="cell" v-for="n in 6" :key="n"></div>
            </div>
            <div class="path">
              <div class="cell" v-for="n in 6" :key="n"></div>
            </div>
            <div class="path">
              <div class="cell" v-for="n in 6" :key="n"></div>
            </div>
          </div>
          <div class="board-home"></div>
          <div class="gallery">
            <div class="path">
              <div class="cell" v-for="n in 6" :key="n"></div>
            </div>
            <div class="path">
              <div class="cell" v-for="n in 6" :key="n"></div>
            </div>
            <div class="path">
              <div class="cell" v-for="n in 6" :key="n"></div>
            </div>
          </div>
        </div>
        <div class="board-bottom">
          <div class="base"></div>
          <div class="gallery vertical">
            <div class="path">
              <div class="cell" v-for="n in 6" :key="n"></div>
            </div>
            <div class="path">
              <div class="cell" v-for="n in 6" :key="n"></div>
            </div>
            <div class="path">
              <div class="cell" v-for="n in 6" :key="n"></div>
            </div>
          </div>
          <div class="base"></div>
        </div>
      </div>
    </main>
  </body>
</html>
